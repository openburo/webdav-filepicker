<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVE — Client</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mu.amber.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='client.css') }}">
  </head>
  <body>
    <main class="container">
      <h1>SAVE</h1>
      <p><a href="{{ url_for('index') }}">&larr; Retour</a></p>

      <form id="save-form">
        <label>Fichiers à envoyer
          <input type="file" name="files" multiple required>
        </label>

        <fieldset>
          <legend>Mode de transmission</legend>
          <label><input type="radio" name="sourceType" value="payload" checked> Payload (base64)</label>
          <label><input type="radio" name="sourceType" value="downloadUrl"> Download URL</label>
        </fieldset>

        <fieldset>
          <legend>Mode d'ouverture</legend>
          <label><input type="radio" name="display" value="iframe" checked> Iframe</label>
          <label><input type="radio" name="display" value="popup"> Popup</label>
        </fieldset>

        <button type="submit" class="btn btn-primary">Choisir la destination</button>
      </form>

      <div id="result"></div>

      <div id="picker-overlay">
        <iframe id="picker-iframe"></iframe>
      </div>
    </main>

    <script src="{{ url_for('static', filename='utils.js') }}"></script>
    <script src="{{ url_for('static', filename='picker-bridge.js') }}"></script>
    <script>
      const bridge = new PickerBridge("{{ picker_url }}");

      function readFileAsBase64(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.readAsDataURL(file);
        });
      }

      document.getElementById("save-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = e.target;

        bridge.display = form.querySelector('[name="display"]:checked').value;

        const files = Array.from(form.querySelector('[name="files"]').files);
        if (files.length === 0) return;

        const sourceType = form.querySelector('[name="sourceType"]:checked').value;

        const params = new URLSearchParams();
        params.set("sourceType", sourceType);

        if (sourceType === "payload") {
          bridge.pendingFiles = await Promise.all(files.map(async (f) => ({
            name: f.name,
            mimeType: f.type,
            size: f.size,
            payload: await readFileAsBase64(f),
          })));
        }

        bridge.open(params);
      });
    </script>
  </body>
</html>
