<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK — Client</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mu.amber.css') }}">
    <style>
      #picker-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      #picker-overlay.active { display: flex; }
      #picker-iframe {
        width: 80%; height: 80%;
        border: none; border-radius: 0.5rem;
        background: white;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>PICK</h1>
      <p><a href="{{ url_for('index') }}">&larr; Retour</a></p>

      <form id="picker-form">
        <label>
          <input type="checkbox" name="multiple"> Sélection multiple
        </label>

        <label>Types MIME autorisés
          <select name="allowedMimeTypes" multiple>
            <option value="*/*">Tous (*/*)</option>
            <option value="image/*">Images (image/*)</option>
            <option value="text/*">Texte (text/*)</option>
            <option value="application/pdf">PDF (application/pdf)</option>
            <option value="application/json">JSON (application/json)</option>
            <option value="text/csv">CSV (text/csv)</option>
          </select>
        </label>

        <fieldset>
          <legend>Type de retour</legend>
          <label><input type="checkbox" name="type" value="sharingUrl" checked> Sharing URL</label>
          <label><input type="checkbox" name="type" value="downloadUrl"> Download URL</label>
          <label><input type="checkbox" name="type" value="payload"> Payload (base64)</label>
        </fieldset>

        <button type="submit" class="btn btn-primary">Ouvrir le picker</button>
      </form>

      <div id="result"></div>

      <div id="picker-overlay">
        <iframe id="picker-iframe"></iframe>
      </div>
    </main>

    <script src="{{ url_for('static', filename='utils.js') }}"></script>
    <script>
      const PICKER_URL = "{{ picker_url }}";
      let currentIntentId = null;

      document.getElementById("picker-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const form = e.target;

        const multiple = form.querySelector('[name="multiple"]').checked;
        const mimeSelect = form.querySelector('[name="allowedMimeTypes"]');
        const allowedMimeTypes = Array.from(mimeSelect.selectedOptions).map(o => o.value);
        const typeCheckboxes = form.querySelectorAll('[name="type"]:checked');
        const types = Array.from(typeCheckboxes).map(cb => cb.value);

        currentIntentId = generateId();

        const params = new URLSearchParams();
        params.set("clientUrl", window.location.origin);
        params.set("id", currentIntentId);
        params.set("multiple", multiple);
        if (allowedMimeTypes.length > 0) params.set("allowedMimeTypes", allowedMimeTypes.join(","));
        if (types.length > 0) params.set("type", types.join(","));

        document.getElementById("picker-iframe").src = PICKER_URL + "?" + params.toString();
        document.getElementById("picker-overlay").classList.add("active");
      });

      function closePicker() {
        document.getElementById("picker-overlay").classList.remove("active");
        document.getElementById("picker-iframe").src = "";
      }

      document.getElementById("picker-overlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closePicker();
      });

      window.addEventListener("message", (e) => {
        const pickerOrigin = new URL(PICKER_URL).origin;
        if (e.origin !== pickerOrigin) return;

        const data = e.data;
        if (!data || !data.status) return;
        if (data.id !== currentIntentId) return;

        const result = document.getElementById("result");

        if (data.status === "done") {
          const rows = data.results.map(r =>
            `<tr><td><a href="${r.sharingUrl || '#'}">${r.name}</a></td><td>${r.mimeType}</td><td>${r.size}</td></tr>`
          ).join("");
          result.innerHTML = `
          <div class="alert alert-success alert-dismissible">
            <span class="alert-title">Fichiers sélectionnés</span>
            <table class="table-compact">
              <thead><tr><th>Nom</th><th>Type</th><th>Taille</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <button class="alert-close" aria-label="Close" onclick="this.parentElement.remove()">&times;</button>
          </div>`;
          closePicker();
        } else if (data.status === "cancel") {
          result.innerHTML = `
          <div class="alert alert-info alert-dismissible">
            <p>Sélection annulée.</p>
            <button class="alert-close" aria-label="Close" onclick="this.parentElement.remove()">&times;</button>
          </div>`;
          closePicker();
        } else if (data.status === "error") {
          result.innerHTML = `
          <div class="alert alert-error alert-dismissible">
            <span class="alert-title">Erreur</span>
            <p>${data.message}</p>
            <button class="alert-close" aria-label="Close" onclick="this.parentElement.remove()">&times;</button>
          </div>`;
          closePicker();
        }
      });
    </script>
  </body>
</html>
